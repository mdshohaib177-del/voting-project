<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="card">

    <h2>Admin Portal</h2>

    <input
    type="text"
    id="adminUser"
    placeholder="Admin ID">

    <input
    type="password"
    id="adminPass"
    placeholder="Password">

    <button
    class="btn"
    onclick="adminLogin()">
        Login
    </button>

</div>

<script src="js/admin.js"></script>

</body>
</html>
