<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Election Results</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body onload="loadResults()">

<div class="results-container">

    <h1>Election Results</h1>

    <div class="winner-card">
        <h2>🏆 Current Winner</h2>
        <h3 id="winner">Loading...</h3>
    </div>

    <div class="result-card">
        <div class="candidate-header">
            <h3>Candidate A</h3>
            <span id="candidateA">0 Votes</span>
        </div>

        <div class="progress">
            <div id="barA" class="progress-fill"></div>
        </div>
    </div>

    <div class="result-card">
        <div class="candidate-header">
            <h3>Candidate B</h3>
            <span id="candidateB">0 Votes</span>
        </div>

        <div class="progress">
            <div id="barB" class="progress-fill"></div>
        </div>
    </div>

    <div class="result-card">
        <div class="candidate-header">
            <h3>Candidate C</h3>
            <span id="candidateC">0 Votes</span>
        </div>

        <div class="progress">
            <div id="barC" class="progress-fill"></div>
        </div>
    </div>

    <div class="stats-box">
        <h2 id="totalVotes">Total Votes : 0</h2>
    </div>

    <div class="button-group">
        <button class="btn" onclick="loadResults()">
            Refresh Results
        </button>
    
    <button class="btn"
    onclick="window.location.href='index.html'">
        Back To Home
    </button>
        </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/results.js"></script>

</body>
</html>
